name: CI - DevSecOps Quality Gates

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (web + tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r web/requirements.txt
          pip install pytest pip-audit

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: |
          pip-audit -r web/requirements.txt -f json -o pip_audit_web.json
          pip-audit -r vault/requirements.txt -f json -o pip_audit_vault.json

      - name: Build Docker image
        run: |
          docker build -t missionimpossible:ci .

      - name: Trivy scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "missionimpossible:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            pip_audit_web.json
            pip_audit_vault.json
            trivy-results.sarif